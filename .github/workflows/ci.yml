name: Native V7 CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: native-v7-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUST_TOOLCHAIN: "1.91.0"

jobs:
  quality:
    name: Format, check, and Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository and pinned dependencies
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-v7-quality

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all default-feature targets
        run: cargo check --locked --all-targets

      - name: Check native no-default-features targets
        run: cargo check --locked --no-default-features --all-targets

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  regression:
    name: Rust regression (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository and pinned dependencies
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-v7-${{ matrix.os }}

      - name: Run all Rust tests
        run: cargo test --locked --all-targets

  native-v7-contracts:
    name: Native V7 focused contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository and pinned dependencies
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-v7-contracts

      - name: Test V7 frontend, bytecode, runtime, GC, and cache contracts
        run: >-
          cargo test --locked
          --test frontend_v7
          --test bytecode_v7_contract
          --test frontend_bytecode_v7
          --test native_v7_runtime
          --test native_v7_gc
          --test native_v7_cache

      - name: Test V7 contracts without default features
        run: >-
          cargo test --locked --no-default-features
          --test frontend_v7
          --test bytecode_v7_contract
          --test frontend_bytecode_v7
          --test native_v7_runtime
          --test native_v7_gc
          --test native_v7_cache

  native-test262:
    name: Native V1-V7 Test262 gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - quality
      - native-v7-contracts
    steps:
      - name: Check out repository and pinned dependencies
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-v7-test262

      - name: Build native release binary without Boa
        run: cargo build --locked --release --no-default-features

      - name: Run fixed Native V1-V6 gates and V7 scan selector tests
        run: cargo test --locked --no-default-features --test native_test262

      - name: Verify Test262 dashboard harness compiles
        run: >-
          cargo test --locked --release --no-default-features
          --test native_full_test262_by_dir --no-run

      - name: Smoke V7 diagnostic scan and JSON writer
        run: >-
          cargo run --locked --release --no-default-features --
          test262 --native-v7-scan --jobs 4 --limit 5
          --json reports/native-v7-frontend-smoke.json
